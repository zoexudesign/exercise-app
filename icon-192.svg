    <line x1="-24" y1="28" x2="-30" y2="44" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="-4" x2="20" y2="24" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <line x1="20" y1="24" x2="14" y2="44" stroke="white" stroke-width="6" stroke-linecap="round"/>
