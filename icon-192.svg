<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="50%" stop-color="#00cec9"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  
  <!-- Subtle shine overlay -->
  <rect width="192" height="192" rx="42" fill="url(#shine)"/>

  <!-- Runner figure - clean geometric style -->
  <g transform="translate(96, 88)" filter="url(#shadow)">
    <!-- Head -->
    <circle cx="14" cy="-42" r="10" fill="white"/>
    
    <!-- Torso - angled for running pose -->
    <path d="M10,-32 L2,-4" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>
    
    <!-- Front arm (reaching forward) -->
    <path d="M8,-26 Q-4,-20 -18,-28" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
    
    <!-- Back arm (swinging back) -->
    <path d="M8,-26 Q18,-18 26,-26" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
    
    <!-- Front leg (extended) -->
    <path d="M2,-4 Q-8,14 -22,24" stroke="white" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M-22,24 L-32,28" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
    
    <!-- Back leg (pushing off) -->
    <path d="M2,-4 Q12,12 22,20" stroke="white" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M22,20 L18,32" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Motion lines -->
  <g opacity="0.6">
    <line x1="36" y1="68" x2="50" y2="68" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="82" x2="48" y2="82" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="34" y1="96" x2="46" y2="96" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom text area: "30min" -->
  <text x="96" y="158" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" letter-spacing="2">30 MIN</text>
</svg>
